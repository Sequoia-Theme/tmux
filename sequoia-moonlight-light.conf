# Sequoia Sequoia Moonlight Light for tmux
set -g @dracula-theme 'sequoia-moonlight-light'
set -g status-style 'bg=#edeef2,fg=#282930'
set -g status-left-style 'bg=#e2e3e8,fg=#282930'
set -g status-right-style 'bg=#e2e3e8,fg=#42434e'
set -g window-status-current-style 'bg=#d9884a,fg=#0f1014,bold'
set -g window-status-style 'bg=#edeef2,fg=#42434e'
set -g message-style 'bg=#e2e3e8,fg=#282930'
set -g pane-border-style 'fg=#42434e'
set -g pane-active-border-style 'fg=#d9884a'
set -g @dracula-color0 '#d4d5dc'
set -g @dracula-color1 '#c94da8'
set -g @dracula-color2 '#4a85d4'
set -g @dracula-color3 '#6a6a78'
set -g @dracula-color4 '#9a5fd9'
set -g @dracula-color5 '#282930'
set -g @dracula-color6 '#d9884a'
set -g @dracula-color7 '#282930'
set -g @dracula-color8 '#42434e'
set -g @dracula-color9 '#c94da8'
set -g @dracula-color10 '#4a85d4'
set -g @dracula-color11 '#6a6a78'
set -g @dracula-color12 '#9a5fd9'
set -g @dracula-color13 '#282930'
set -g @dracula-color14 '#d9884a'
set -g @dracula-color15 '#282930'
