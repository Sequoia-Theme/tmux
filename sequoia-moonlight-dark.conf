# Sequoia Sequoia Moonlight Dark for tmux
set -g @dracula-theme 'sequoia-moonlight-dark'
set -g status-style 'bg=#0f1014,fg=#868690'
set -g status-left-style 'bg=#111216,fg=#868690'
set -g status-right-style 'bg=#111216,fg=#575861'
set -g window-status-current-style 'bg=#ffbb88,fg=#0f1014,bold'
set -g window-status-style 'bg=#0f1014,fg=#575861'
set -g message-style 'bg=#111216,fg=#868690'
set -g pane-border-style 'fg=#575861'
set -g pane-active-border-style 'fg=#ffbb88'
set -g @dracula-color0 '#131317'
set -g @dracula-color1 '#f58ee0'
set -g @dracula-color2 '#8eb6f5'
set -g @dracula-color3 '#9898a6'
set -g @dracula-color4 '#c58fff'
set -g @dracula-color5 '#fdfdfe'
set -g @dracula-color6 '#ffbb88'
set -g @dracula-color7 '#868690'
set -g @dracula-color8 '#575861'
set -g @dracula-color9 '#f58ee0'
set -g @dracula-color10 '#8eb6f5'
set -g @dracula-color11 '#9898a6'
set -g @dracula-color12 '#c58fff'
set -g @dracula-color13 '#fdfdfe'
set -g @dracula-color14 '#ffbb88'
set -g @dracula-color15 '#868690'
